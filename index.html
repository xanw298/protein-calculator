<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>하루 단백질 섭취 계산기</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #f5f5f5;
      color: #222;
    }

    .box {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0 18px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }

    .result {
      margin-top: 24px;
      padding: 18px;
      background: #eef5ff;
      border-radius: 10px;
    }

    .record {
      margin: 10px 0;
      padding: 12px;
      background: #fff;
      border-left: 5px solid #3b82f6;
    }

    .warning {
      background: #fff3f3;
      border-left: 5px solid #ef4444;
      padding: 12px;
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>하루 단백질 섭취 계산기</h1>
    <p>음식을 먹을 때마다 단백질 g을 기록하면 오늘 총 섭취량과 목표 범위를 계산합니다.</p>

    <label>체중 kg</label>
    <input type="number" id="weight" placeholder="예: 64" />

    <label>운동량 / 목표</label>
    <select id="activity">
      <option value="low">거의 운동 안 함</option>
      <option value="normal">가벼운 운동</option>
      <option value="active">꾸준히 운동함</option>
      <option value="muscle">근비대 / 웨이트 집중</option>
      <option value="diet">다이어트 중 근손실 방지</option>
    </select>

    <hr />

    <h2>단백질 기록 추가</h2>

    <label>음식 이름</label>
    <input type="text" id="foodName" placeholder="예: 닭가슴살, 계란, 두부" />

    <label>단백질 g</label>
    <input type="number" id="proteinAmount" placeholder="예: 25" />

    <button onclick="addProteinRecord()">기록 추가</button>
    <button onclick="resetRecords()">오늘 기록 초기화</button>

    <div id="recordList" class="result">
      <h3>오늘 단백질 기록</h3>
      <p>아직 기록이 없어요.</p>
    </div>

    <div id="result" class="result">
      <h3>오늘 총 단백질 섭취량</h3>
      <p>체중과 기록을 입력하면 결과가 나와요.</p>
    </div>
  </div>

  <script>
    let proteinRecords = [];

    function addProteinRecord() {
      const weight = Number(document.getElementById("weight").value);
      const foodName = document.getElementById("foodName").value.trim();
      const proteinAmount = Number(document.getElementById("proteinAmount").value);

      if (!weight || weight <= 0) {
        alert("먼저 체중을 입력해줘.");
        return;
      }

      if (!foodName || !proteinAmount || proteinAmount <= 0) {
        alert("음식 이름과 단백질 g을 제대로 입력해줘.");
        return;
      }

      proteinRecords.push({
        name: foodName,
        amount: proteinAmount
      });

      document.getElementById("foodName").value = "";
      document.getElementById("proteinAmount").value = "";

      updateProteinResult();
    }

    function deleteProteinRecord(index) {
      proteinRecords.splice(index, 1);
      updateProteinResult();
    }

    function resetRecords() {
      proteinRecords = [];
      updateProteinResult();
    }

    function updateProteinResult() {
      const weight = Number(document.getElementById("weight").value);
      const activity = document.getElementById("activity").value;
      const result = document.getElementById("result");
      const recordList = document.getElementById("recordList");

      if (!weight || weight <= 0) {
        recordList.innerHTML = `
          <h3>오늘 단백질 기록</h3>
          <p>먼저 체중을 입력해줘.</p>
        `;

        result.innerHTML = `
          <h3>오늘 총 단백질 섭취량</h3>
          <p>체중과 기록을 입력하면 결과가 나와요.</p>
        `;
        return;
      }

      const totalProtein = proteinRecords.reduce((sum, item) => {
        return sum + item.amount;
      }, 0);

      let targetLow;
      let targetHigh;
      let goalText;

      if (activity === "low") {
        targetLow = Math.round(weight * 0.8);
        targetHigh = Math.round(weight * 1.2);
        goalText = "일반적인 건강 유지";
      } else if (activity === "normal") {
        targetLow = Math.round(weight * 1.2);
        targetHigh = Math.round(weight * 1.6);
        goalText = "가벼운 운동과 체성분 관리";
      } else if (activity === "active") {
        targetLow = Math.round(weight * 1.4);
        targetHigh = Math.round(weight * 2.0);
        goalText = "꾸준한 운동과 회복";
      } else if (activity === "muscle") {
        targetLow = Math.round(weight * 1.6);
        targetHigh = Math.round(weight * 2.2);
        goalText = "근비대";
      } else {
        targetLow = Math.round(weight * 1.8);
        targetHigh = Math.round(weight * 2.4);
        goalText = "다이어트 중 근손실 방지";
      }

      let statusText = "";
      let detailText = "";

      if (totalProtein === 0) {
        statusText = "아직 단백질 기록이 없어요.";
        detailText = "음식을 먹을 때마다 단백질 g을 기록해보세요.";
      } else if (totalProtein < targetLow) {
        statusText = `아직 부족해요. 목표까지 ${targetLow - totalProtein}g 정도 더 필요해요.`;
        detailText = "현재 상태에서는 근육 회복, 포만감, 근손실 방지 측면에서 조금 부족할 수 있어요.";
      } else if (totalProtein <= targetHigh) {
        statusText = "오늘 단백질 섭취량이 목표 범위 안에 있어요.";
        detailText = "근육 유지, 회복, 포만감 관리에 좋은 구간이에요.";
      } else {
        statusText = `목표보다 ${totalProtein - targetHigh}g 정도 많아요.`;
        detailText = "오늘은 단백질을 더 챙기기보다 탄수화물, 지방, 채소 균형을 보는 게 좋아요.";
      }

      recordList.innerHTML = `
        <h3>오늘 단백질 기록</h3>
        ${
          proteinRecords.length === 0
            ? "<p>아직 기록이 없어요.</p>"
            : proteinRecords.map((item, index) => `
                <div class="record">
                  <strong>${item.name}</strong> - ${item.amount}g
                  <button onclick="deleteProteinRecord(${index})">삭제</button>
                </div>
              `).join("")
        }
      `;

      result.innerHTML = `
        <h3>오늘 총 단백질 섭취량</h3>
        <p><strong>${totalProtein}g</strong></p>

        <p>${goalText} 기준 추천 범위: <strong>${targetLow}g ~ ${targetHigh}g</strong></p>

        <p><strong>${statusText}</strong></p>
        <p>${detailText}</p>

        <div class="warning">
          <strong>주의</strong>
          <p>단백질을 많이 먹는다고 무조건 근육이 더 잘 붙는 건 아니에요. 총칼로리, 운동 강도, 수면도 같이 중요합니다.</p>
        </div>
      `;
    }

    document.getElementById("weight").addEventListener("input", updateProteinResult);
    document.getElementById("activity").addEventListener("change", updateProteinResult);
  </script>
</body>
</html>
